name: CI

on:
  pull_request:
    branches:
      - main
      - production
  push:
    branches:
      - main
      - production
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: [foglet-ci]
    env:
      ImageOS: ubuntu24

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432/tcp
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-deps-${{ hashFiles('mix.lock') }}

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-${{ runner.name }}-build-${{ hashFiles('mix.lock') }}

      - name: Cache dialyzer PLTs
        if: github.event_name != 'pull_request'
        uses: actions/cache@v4
        with:
          path: _build/dev/*.plt*
          key: ${{ runner.os }}-${{ runner.name }}-plt-${{ hashFiles('mix.lock') }}

      - run: mix deps.get

      - name: GitHub metadata hygiene
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          PR_TITLE: ${{ github.event.pull_request.title || '' }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          BEFORE_SHA: ${{ github.event.before || '' }}
        run: |
          set -euo pipefail

          args=(foglet.github_hygiene --branch "$BRANCH_NAME")

          if [ -n "$PR_BASE_SHA" ] && [ -n "$PR_HEAD_SHA" ]; then
            rev_range="$PR_BASE_SHA..$PR_HEAD_SHA"
          elif [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            rev_range="$BEFORE_SHA..HEAD"
          else
            rev_range="HEAD~1..HEAD"
          fi

          while IFS= read -r subject; do
            [ -n "$subject" ] || continue
            args+=(--commit-subject "$subject")
          done < <(git log --format=%s "$rev_range")

          if [ -n "$PR_TITLE" ]; then
            args+=(--pr-title "$PR_TITLE")
          fi

          if [ -n "$PR_BODY" ]; then
            args+=(--pr-body "$PR_BODY")
          fi

          mix "${args[@]}"

      - run: mix format --check-formatted
      - run: mix compile --warnings-as-errors
      - run: mix credo --strict
      - run: mix test
        env:
          DATABASE_URL: ecto://postgres:postgres@localhost:${{ job.services.postgres.ports[5432] }}/foglet_bbs_test

      - name: Hex audit
        if: github.event_name != 'pull_request'
        run: mix hex.audit

      - name: Sobelow
        if: github.event_name != 'pull_request'
        run: mix sobelow --exit Low

      - name: Dialyzer
        if: github.event_name != 'pull_request'
        run: mix dialyzer
