name: Merge Governance

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, edited]
  issue_comment:
    types: [created, edited]

permissions:
  issues: read
  pull-requests: read

jobs:
  board-approval:
    name: board approval
    if: github.event_name != 'issue_comment' || github.event.issue.pull_request
    runs-on: ubuntu-latest

    steps:
      - name: Require independent approval
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.eventName === "issue_comment"
              ? context.payload.issue.number
              : context.payload.pull_request.number;

            const { data: pull } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number,
            });

            const author = pull.user.login;
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const latestReviewByUser = new Map();
            for (const review of reviews) {
              const login = review.user?.login;
              if (!login) continue;
              const previous = latestReviewByUser.get(login);
              const previousTime = previous?.submitted_at ?? previous?.submittedAt ?? "";
              const reviewTime = review.submitted_at ?? "";
              if (!previous || reviewTime >= previousTime) {
                latestReviewByUser.set(login, review);
              }
            }

            const independentApproval = [...latestReviewByUser.values()].some((review) => (
              review.state === "APPROVED" && review.user.login !== author
            ));

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pull_number,
              per_page: 100,
            });

            const approvalCommentPattern = /^\s*Board approval:\s*approved\b/im;
            const independentBoardComment = comments.some((comment) => (
              comment.user.login !== author && approvalCommentPattern.test(comment.body ?? "")
            ));

            if (independentApproval || independentBoardComment) {
              core.info("Independent approval found.");
              return;
            }

            core.setFailed(
              "Merge requires independent approval: either a formal approving review from someone other than the PR author, or a PR comment from someone other than the author beginning with 'Board approval: approved'."
            );
